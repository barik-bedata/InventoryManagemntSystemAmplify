version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm install --legacy-peer-deps
    build:
      commands:
        - npx prisma generate
        - npx prisma db push
        - npm run build
  artifacts:
    baseDirectory: dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*