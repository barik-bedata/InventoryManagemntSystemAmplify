version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20        # or whatever version matches your local dev
        - node -v && npm -v  # confirm versions
        - npm ci
    build:
      commands:
        - npx prisma generate
        - npx prisma db push
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*