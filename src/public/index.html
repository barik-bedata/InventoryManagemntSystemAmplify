<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
      background-attachment: fixed;
    }

    header {
      padding: 2rem 5%;
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 5%;
    }

    .loader {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-muted);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      padding-bottom: 4rem;
    }

    .category-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(16px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: default;
    }

    .category-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(99, 102, 241, 0.2);
      border-color: rgba(129, 140, 248, 0.3);
    }

    .category-card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .product-list {
      list-style: none;
    }

    .product-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.2s ease;
    }

    .product-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .product-item:first-child {
      padding-top: 0;
    }

    .product-title {
      font-size: 1.1rem;
      font-weight: 400;
    }

    .product-tag {
      background: rgba(99, 102, 241, 0.1);
      color: #818cf8;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    /* Minimalist scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color); 
    }
    ::-webkit-scrollbar-thumb {
      background: var(--card-border); 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary); 
    }
  </style>
</head>
<body>

  <header>
    <h1>IMS Dashboard</h1>
  </header>

  <div class="container">
    <div id="loader" class="loader">Fetching Data...</div>
    <div id="category-grid" class="grid"></div>
  </div>

  <script>
    async function fetchCategories() {
      try {
        const response = await fetch('/categories');
        const categories = await response.json();
        
        const loader = document.getElementById('loader');
        const grid = document.getElementById('category-grid');
        
        loader.style.display = 'none';

        if (categories.length === 0) {
          grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color: var(--text-muted)">No categories found.</p>';
          return;
        }

        categories.forEach(category => {
          const card = document.createElement('div');
          card.className = 'category-card';
          
          let productsHTML = '';
          if (category.products && category.products.length > 0) {
            productsHTML = '<ul class="product-list">';
            category.products.forEach(product => {
              productsHTML += `
                <li class="product-item">
                  <span class="product-title">${product.title}</span>
                  <span class="product-tag">${product.tag || 'Standard'}</span>
                </li>
              `;
            });
            productsHTML += '</ul>';
          } else {
            productsHTML = '<p style="color: var(--text-muted); font-size: 0.9rem">No products in this category.</p>';
          }

          card.innerHTML = `
            <h2>${category.title} <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400">(${category.products?.length || 0})</span></h2>
            ${productsHTML}
          `;
          
          grid.appendChild(card);
        });
      } catch (error) {
        console.error('Error fetching categories:', error);
        document.getElementById('loader').innerText = 'Failed to load data. Please check if the server is running.';
      }
    }

    // Load data on start
    fetchCategories();
  </script>
</body>
</html>
